server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # =====================================================================
    # Healthcheck propio del frontend (usado por las probes de Kubernetes)
    # =====================================================================
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # =====================================================================
    # SPA de React: cualquier ruta desconocida devuelve index.html
    # (necesario para que funcione react-router al recargar la página)
    # =====================================================================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # =====================================================================
    # PROXY INVERSO hacia los microservicios backend (comunicación Front->Back)
    #
    # El navegador llama a /api/... (mismo origen que el frontend) y Nginx
    # reenvía la petición al Service interno (ClusterIP) correspondiente,
    # resolviendo el nombre por DNS de Kubernetes (CoreDNS).
    #
    # IMPORTANTE: el proxy_pass NO lleva "/" final, para CONSERVAR el prefijo
    # /api que esperan los controladores Spring Boot
    # (@RequestMapping("api/v1/...")). Con "/" final Nginx borraría el /api
    # y el backend respondería 404.
    #
    # Nginx elige la ruta por prefijo más largo, así que /api/v1/ventas gana
    # sobre /api/ y se enruta al microservicio de ventas.
    # =====================================================================

    # Microservicio de VENTAS  ->  Service "api-ventas"
    location /api/v1/ventas {
        proxy_pass http://api-ventas:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Microservicio de DESPACHOS  ->  Service "api-despachos"
    # (captura el resto de /api/, incluido /api/v1/despachos)
    location /api/ {
        proxy_pass http://api-despachos:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
