# =====================================================================
# FRONTEND - React + Nginx (único servicio expuesto a Internet)
# Imagen desde Amazon ECR. Service type LoadBalancer => AWS provisiona
# un Network Load Balancer (NLB) público con una URL accesible.
# Nginx hace de reverse proxy hacia los backends internos (/api/...).
# =====================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: front-despacho
  namespace: innovatech
  labels:
    app: frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: ${ECR_REGISTRY}/frontend-despacho:${IMAGE_TAG}
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        startupProbe:
          httpGet:
            path: /healthz
            port: 80
          failureThreshold: 20
          periodSeconds: 3
        readinessProbe:
          httpGet:
            path: /healthz
            port: 80
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: 80
          periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: front-despacho
  namespace: innovatech
  annotations:
    # NLB público gestionado por el cloud-provider in-tree de EKS
    # (no requiere instalar el AWS Load Balancer Controller).
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
spec:
  selector:
    app: frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: LoadBalancer
