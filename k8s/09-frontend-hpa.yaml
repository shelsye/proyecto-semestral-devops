# =====================================================================
# HPA - Autoscaling del Frontend (IE3)
# Escala de 2 a 5 réplicas según uso de CPU.
# Umbral 50%: el frontend es el punto de entrada público y conviene
# que reaccione antes ante aumentos de tráfico.
# Requiere metrics-server instalado en el clúster.
# =====================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: front-despacho-hpa
  namespace: innovatech
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: front-despacho
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
