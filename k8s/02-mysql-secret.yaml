# =====================================================================
# Secret con la contraseña root de MySQL (IE5 - gestión de secrets)
#
# IMPORTANTE: este archivo NO contiene la contraseña real. El valor se
# inyecta en tiempo de despliegue con envsubst desde la variable de
# entorno MYSQL_ROOT_PASSWORD (ver scripts/deploy.sh y el README).
# Así la credencial nunca queda versionada en el repositorio.
#
# Despliegue manual equivalente:
#   export MYSQL_ROOT_PASSWORD=tu_password
#   envsubst '${MYSQL_ROOT_PASSWORD}' < k8s/02-mysql-secret.yaml | kubectl apply -f -
# =====================================================================
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: innovatech
type: Opaque
stringData:
  root-password: "${MYSQL_ROOT_PASSWORD}"
