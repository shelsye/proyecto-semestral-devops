spring.application.name=Springboot-API-REST-DESPACHO
server.port=8080
spring.web.allow-cors=true

# =========================================================
# Configuracion de la base de datos MySQL en AWS RDS
# Los valores se inyectan como variables de entorno desde
# el pipeline CI/CD o docker-compose
# =========================================================
spring.datasource.url=jdbc:mysql://${DB_ENDPOINT}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.platform=mysql

# =========================================================
# Configuracion de Hibernate / JPA
# =========================================================
spring.jpa.database=mysql
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =========================================================
# Swagger UI disponible en /swagger-ui.html
# =========================================================
springdoc.swagger-ui.path=/swagger-ui.html
